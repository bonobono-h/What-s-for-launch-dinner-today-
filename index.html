<script>
function makeDodge(btn, wrap, options) {
  options = options || {};
  const avoidEl = options.avoid || null;
  const onAttempt = options.onAttempt || null;
  let touched = false;
  let attempts = 0;
  let lastCountTime = 0;
  const margin = 8;
  const avoidPad = 18;

  function countAttempt() {
    const now = Date.now();
    if (now - lastCountTime > 150) {
      attempts++;
      lastCountTime = now;
      if (onAttempt) onAttempt(attempts);
    }
  }

  function getAvoidRect() {
    if (!avoidEl) return null;
    const wrapRect = wrap.getBoundingClientRect();
    const elRect = avoidEl.getBoundingClientRect();
    return {
      left: elRect.left - wrapRect.left - avoidPad,
      top: elRect.top - wrapRect.top - avoidPad,
      right: elRect.left - wrapRect.left + elRect.width + avoidPad,
      bottom: elRect.top - wrapRect.top + elRect.height + avoidPad
    };
  }

  function overlapsAvoid(candLeft, candTop, btnWidth, btnHeight, avoidRect) {
    if (!avoidRect) return false;
    const candRight = candLeft + btnWidth;
    const candBottom = candTop + btnHeight;
    return !(candRight < avoidRect.left || candLeft > avoidRect.right || candBottom < avoidRect.top || candTop > avoidRect.bottom);
  }

  function randomFarPoint(fromX, fromY) {
    const wrapRect = wrap.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    const maxLeft = Math.max(wrapRect.width - btnRect.width - margin, margin);
    const maxTop = Math.max(wrapRect.height - btnRect.height - margin, margin);
    const avoidRect = getAvoidRect();

    let best = null;
    let bestDist = -1;
    let bestNonOverlap = null;
    let bestNonOverlapDist = -1;
    for (let i = 0; i < 24; i++) {
      const candLeft = Math.random() * maxLeft;
      const candTop = Math.random() * maxTop;
      const candCx = candLeft + btnRect.width / 2;
      const candCy = candTop + btnRect.height / 2;
      const dx = candCx - (fromX - wrapRect.left);
      const dy = candCy - (fromY - wrapRect.top);
      const dist = dx * dx + dy * dy;
      const overlaps = overlapsAvoid(candLeft, candTop, btnRect.width, btnRect.height, avoidRect);
      if (!overlaps && dist > bestNonOverlapDist) {
        bestNonOverlapDist = dist;
        bestNonOverlap = { left: candLeft, top: candTop };
      }
      if (dist > bestDist) {
        bestDist = dist;
        best = { left: candLeft, top: candTop };
      }
    }
    return bestNonOverlap || best;
  }

  function moveAwayFrom(clientX, clientY) {
    countAttempt();
    const p = randomFarPoint(clientX, clientY);
    btn.style.left = p.left + 'px';
    btn.style.top = p.top + 'px';
  }

  function moveRandom() {
    countAttempt();
    const wrapRect = wrap.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    const maxLeft = Math.max(wrapRect.width - btnRect.width - margin, margin);
    const maxTop = Math.max(wrapRect.height - btnRect.height - margin, margin);
    const avoidRect = getAvoidRect();
    let left, top;
    for (let i = 0; i < 24; i++) {
      left = Math.random() * maxLeft;
      top = Math.random() * maxTop;
      if (!overlapsAvoid(left, top, btnRect.width, btnRect.height, avoidRect)) break;
    }
    btn.style.left = left + 'px';
    btn.style.top = top + 'px';
  }

  function arm() {
    if (!touched) {
      touched = true;
      btn.style.transform = 'none';
    }
  }

  wrap.addEventListener('mousemove', function(e) {
    arm();
    const btnRect = btn.getBoundingClientRect();
    const cx = btnRect.left + btnRect.width / 2;
    const cy = btnRect.top + btnRect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const threshold = Math.max(btnRect.width, btnRect.height) / 2 + 70;
    if (dist < threshold) {
      moveAwayFrom(e.clientX, e.clientY);
    }
  });

  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    arm();
    moveRandom();
  });
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    arm();
    moveRandom();
  });
}

function normalize(str) {
  return str.replace(/\s/g, '').toLowerCase();
}

function isRefusal(rawVal) {
  const normalized = normalize(rawVal);
  if (!normalized) return true;
  const hasBlockedWord = blockedWords.some(function(w) {
    return normalized.includes(normalize(w));
  });
  if (hasBlockedWord) return true;

  let stripped = normalized;
  blockedWords.forEach(function(w) {
    stripped = stripped.split(normalize(w)).join('');
  });
  if (stripped.length === 0) return true;

  return false;
}

function isFoodLike(rawVal) {
  const normalized = normalize(rawVal);
  return foodPatterns.some(function(w) {
    return normalized.includes(normalize(w));
  });
}

const notFoodReplies = [
  '그거 음식 이름 맞아? 다시 적어줘 ㅋㅋ',
  '음... 그건 못 먹을 것 같은데 ㅋㅋ 진짜 메뉴로 말해줘',
  '그건 메뉴가 아니잖아 ㅋㅋ 뭐 먹고싶은지 적어줘',
  '어? 그건 처음 듣는 음식인데 ㅋㅋ 다시 적어줄래'
];

function pickNotFoodReply() {
  return notFoodReplies[Math.floor(Math.random() * notFoodReplies.length)];
}

customToggleBtn.addEventListener('click', function() {
  customToggleBtn.style.display = 'none';
  customInputRow.style.display = 'flex';
  customMenuInput.focus();
});

customConfirmBtn.addEventListener('click', function() {
  const val = customMenuInput.value.trim();
  if (!val) {
    customError.textContent = '뭐 먹고싶은지 적어줘 ㅋㅋ';
    customError.style.display = 'block';
    return;
  }
  if (isRefusal(val)) {
    customError.textContent = pickRefusalReply();
    customError.style.display = 'block';
    return;
  }
  if (!isFoodLike(val)) {
    customError.textContent = pickNotFoodReply();
    customError.style.display = 'block';
    return;
  }
  customError.style.display = 'none';
  chosenMenu = val;
  pickerView.style.display = 'none';
  timeTitle.textContent = '오늘 ' + chosenMealType + ' 몇 시에 먹을까? ⏰';
  timeSub.textContent = chosenMealType + '에 ' + chosenMenu + ' 먹을 시간 골라줘';
  applyDefaultHour();
  timeView.style.display = 'block';
});

const timeConfirmBtn = document.getElementById('timeConfirm');
let chosenTime = '19:00';

timeConfirmBtn.addEventListener('click', async function() {
  chosenTime = hourSelect.value + ':' + minuteSelect.value;

  timeView.style.display = 'none';
  resultBox.style.display = 'block';
  resultEmoji.textContent = (menuEmojis[chosenMenu] || '🍽️') + ' 🥰';
  resultText.textContent = chosenMealType + '으로 ' + chosenMenu + ' 골랐구나!';
  resultTime.textContent = chosenTime + '에 만나자!';

  notifyNtfy(chosenMealType, chosenMenu, chosenTime);
});
